<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Youtube video downloader</title>
    <style>
        :root {
            --bg-color: #000; --text-color: #fff; --input-bg: #111; --input-border: #333; --input-hover: #555;
            --btn-bg: #fff; --btn-text: #000; --circle-bg: #333; --circle-border: #fff; --shadow-color: rgba(255, 255, 255, 0.2);
            --author-color: #333; --info-color: #888; --error-color: #ff4444;
        }
        [data-theme="light"] {
            --bg-color: #f4f4f4; --text-color: #000; --input-bg: #fff; --input-border: #ccc; --input-hover: #999;
            --btn-bg: #000; --btn-text: #fff; --circle-bg: #ccc; --circle-border: #000; --shadow-color: rgba(0, 0, 0, 0.2);
            --author-color: #888; --info-color: #666; --error-color: #cc0000;
        }
        body { 
            background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; transition: background-color 0.5s ease, color 0.5s ease; 
        }
        h1 { letter-spacing: 5px; margin-bottom: 30px; font-weight: 200; transition: all 0.5s ease; }
        .theme-toggle { 
            position: fixed; top: 20px; right: 20px; width: 30px; height: 30px; border-radius: 50%; 
            background: var(--circle-bg); border: 2px solid var(--circle-border); cursor: pointer; 
            transition: all 0.5s ease; box-shadow: 0 0 10px var(--shadow-color); z-index: 10; 
        }
        .theme-toggle:hover { box-shadow: 0 0 20px var(--shadow-color); transform: scale(1.1); }
        .wrapper { display: flex; flex-direction: column; align-items: center; z-index: 2; position: relative; }
        .domain-icon { 
            height: 30px; margin-bottom: -15px; opacity: 0; transform: translateY(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center;
        }
        .domain-icon.visible { opacity: 1; transform: translateY(0); margin-bottom: 15px; }
        .domain-icon svg { width: 80px; height: 30px; fill: var(--text-color); }
        .container { position: relative; display: flex; align-items: center; gap: 10px; z-index: 2; }
        input { 
            padding: 15px 25px; width: 400px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color);
            border-radius: 12px; font-size: 16px; outline: none; transition: all 0.4s ease; box-sizing: border-box;
        }
        input:hover, input:focus { border-color: var(--input-hover); box-shadow: 0 0 20px var(--shadow-color); }
        .btn-download {
            width: 0; opacity: 0; overflow: hidden; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 12px;
            padding: 15px 0; cursor: pointer; font-size: 20px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        input:not(:placeholder-shown) + .btn-download.active { width: 60px; opacity: 1; padding: 15px; }
        
        .unsupported-msg { 
            margin-top: 15px; height: 20px; font-size: 14px; color: var(--error-color); 
            opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; pointer-events: none;
        }
        .unsupported-msg.visible { opacity: 1; transform: translateY(0); }

        .info-panel { 
            margin-top: 20px; width: 420px; font-size: 14px; color: var(--info-color); 
            display: none; opacity: 1; max-height: 200px;
            transition: opacity 0.5s ease, max-height 0.5s ease, transform 0.5s ease, margin 0.5s ease; overflow: hidden;
        }
        .info-panel.hidden { display: block !important; opacity: 0; max-height: 0; transform: translateY(-40px); margin-top: 0; }
        #status-text { color: var(--text-color); font-weight: bold; margin-bottom: 10px; display: block; }
        .loader { width: 100%; height: 4px; background: var(--input-border); position: relative; overflow: hidden; margin-top: 15px; border-radius: 2px; }
        .loader::after { content: ""; position: absolute; left: -150%; width: 100%; height: 100%; background: var(--text-color); animation: loading 2s infinite; }
        @keyframes loading { 100% { left: 100%; } }
        .author { position: fixed; bottom: 20px; font-size: 10px; letter-spacing: 2px; color: var(--author-color); text-transform: uppercase; transition: color 0.5s ease; }
    </style>
</head>
<body>
    <div class="theme-toggle" id="theme-toggle"></div>
    <h1>Youtube video downloader</h1>
    <div class="wrapper">
        <div class="domain-icon" id="domain-icon"></div>
        <div class="container">
            <input type="text" id="url" placeholder="Paste link here..." autocomplete="off" />
            <button class="btn-download" id="dl-btn">➔</button>
        </div>
        <div class="unsupported-msg" id="unsupported-msg">These links are not supported</div>
    </div>
    <div class="info-panel" id="info">
        <span id="status-text">Processing download...</span>
        <div class="loader"></div>
    </div>
    <div class="author">Created by dimoncio & Wrethr</div>

    <script>
        const input = document.getElementById('url');
        const btn = document.getElementById('dl-btn');
        const info = document.getElementById('info');
        const iconContainer = document.getElementById('domain-icon');
        const themeToggle = document.getElementById('theme-toggle');
        const unsupportedMsg = document.getElementById('unsupported-msg');

        const icons = {
            youtube: `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
            tiktok: `<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>`
        };

        function getDomainType(url) {
            if (!url) return null;
            if (url.includes("youtube.com") || url.includes("youtu.be")) return "youtube";
            if (url.includes("tiktok.com")) return "tiktok";
            if (url.includes("spotify.com") || url.includes("music.apple.com")) return "unsupported";
            return null;
        }

        input.addEventListener('input', () => {
            const url = input.value.trim();
            const type = getDomainType(url);
            
            if (type === "unsupported") {
                iconContainer.classList.remove('visible');
                btn.classList.remove('active');
                unsupportedMsg.classList.add('visible');
            } else if (type) {
                iconContainer.innerHTML = icons[type];
                iconContainer.classList.add('visible');
                btn.classList.add('active');
                unsupportedMsg.classList.remove('visible');
            } else {
                iconContainer.classList.remove('visible');
                btn.classList.remove('active');
                unsupportedMsg.classList.remove('visible');
            }
        });

        themeToggle.onclick = () => {
            document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        };

        btn.onclick = async () => {
            const url = input.value.trim();
            if (!url || !getDomainType(url)) return;
            
            info.classList.remove('hidden');
            info.style.display = 'block';
            document.getElementById('status-text').innerText = "Processing download...";
            
            try {
                const res = await fetch('/dl?url=' + encodeURIComponent(url));
                if (res.ok) {
                    document.getElementById('status-text').innerText = "Done! File saved.";
                    input.value = "";
                    iconContainer.classList.remove('visible');
                    btn.classList.remove('active');
                    setTimeout(() => {
                        info.classList.add('hidden');
                        setTimeout(() => {
                            if (info.classList.contains('hidden')) info.style.display = 'none';
                        }, 500);
                    }, 2000);
                } else {
                    document.getElementById('status-text').innerText = "Error! Check server console.";
                }
            } catch (e) {
                document.getElementById('status-text').innerText = "Connection lost or server crashed.";
            }
        };
    </script>
</body>
</html>
